name: Fetch Substack Posts

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:       # allow manual trigger from GitHub UI

concurrency:
  group: fetch-substack-posts
  cancel-in-progress: true

jobs:
  fetch-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch RSS and save posts.json
        run: |
          set -euo pipefail

          fetch_ok=0
          fetch_format="rss"
          for url in \
            "https://cammisabuerhaus.substack.com/feed" \
            "https://cammisabuerhaus.substack.com/feed?output=rss" \
            "https://cammisabuerhaus.substack.com/api/v1/posts"
          do
            echo "Attempting feed URL: $url"
            http_code=$(curl -sS -L \
              --retry 5 \
              --retry-delay 3 \
              --retry-connrefused \
              --connect-timeout 20 \
              --max-time 90 \
              -A "Mozilla/5.0 (compatible; CammisaFeedBot/1.0; +https://github.com/2Eyeballs/Cammisa)" \
              -o feed.xml \
              -w "%{http_code}" \
              "$url" || true)

            if [[ "$http_code" == "200" ]] && [[ -s feed.xml ]]; then
              fetch_ok=1
              if [[ "$url" == *"/api/v1/posts"* ]]; then
                fetch_format="json"
              else
                fetch_format="rss"
              fi
              echo "Feed fetch succeeded from $url"
              break
            fi

            echo "Feed fetch failed from $url (HTTP ${http_code:-unknown})"
          done

          if [[ "$fetch_ok" -ne 1 ]]; then
            echo "Feed unavailable from all attempted URLs; aborting run to avoid silent stale content"
            exit 1
          fi

          export FETCH_FORMAT="$fetch_format"
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          from xml.etree import ElementTree as ET

          with open('feed.xml', 'r', encoding='utf-8') as f:
              data = f.read()

          if not data.strip():
              raise SystemExit('Empty RSS response; keeping existing posts.json')

          posts = []

          fetch_format = os.getenv('FETCH_FORMAT', 'rss')
          if fetch_format == 'json':
              raw_posts = json.loads(data)
              for item in raw_posts:
                  title = item.get('title') or ''
                  if title.startswith('[COPY]'):
                      continue
                  posts.append({
                      'title': title,
                      'link': item.get('canonical_url') or '',
                      'pubDate': item.get('post_date') or '',
                      'description': item.get('description') or '',
                      'content': item.get('body_html') or ''
                  })
          else:
              # RSS responses can occasionally include invalid XML control chars.
              # Strip only illegal XML 1.0 code points to avoid parser crashes.
              data = re.sub(
                  r'[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]',
                  '',
                  data,
                )

              try:
                  root = ET.fromstring(data)
              except ET.ParseError as exc:
                  if os.path.exists('posts.json'):
                      print(f'RSS parse error ({exc}); preserving existing posts.json')
                      raise SystemExit(0)
                  raise SystemExit(f'RSS parse error and no existing posts.json: {exc}')

              ns = {'content': 'http://purl.org/rss/1.0/modules/content/'}
              items = root.findall('.//item')

              for item in items:
                  t = item.find('title')
                  l = item.find('link')
                  d = item.find('pubDate')
                  desc = item.find('description')
                  body = item.find('content:encoded', ns)

                  title = t.text if t is not None and t.text else ''
                  if title.startswith('[COPY]'):
                      continue

                  posts.append({
                      'title': title,
                      'link': l.text.strip() if l is not None and l.text else '',
                      'pubDate': d.text if d is not None and d.text else '',
                      'description': desc.text if desc is not None and desc.text else '',
                      'content': body.text if body is not None and body.text else ''
                  })

          if not posts:
              raise SystemExit('No valid posts parsed from RSS; refusing to overwrite posts.json')

          payload = {'items': posts}
          encoded = json.dumps(payload, ensure_ascii=False, indent=2)
          with open('posts.json', 'w', encoding='utf-8') as f:
              f.write(encoded)
              f.write('\n')

          digest = hashlib.sha256(encoded.encode('utf-8')).hexdigest()
          print(f'Parsed {len(posts)} post(s). sha256={digest}')
          for post in posts[:5]:
              print(f"- {post['title']}")
          PY

      - name: Verify generated JSON
        run: |
          python3 - <<'PY'
          import json
          with open('posts.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          assert isinstance(data, dict) and isinstance(data.get('items'), list)
          print('posts.json verified with', len(data['items']), 'item(s)')
          PY

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add posts.json
          if git diff --staged --quiet; then
            echo "No posts.json changes to commit"
            exit 0
          fi
          git commit -m "chore: update posts.json"
          git push origin HEAD
