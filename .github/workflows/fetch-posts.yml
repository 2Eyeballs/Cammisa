name: Fetch Substack Posts

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  fetch-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS and save posts.json
        run: |
          curl -s "https://cammisabuerhaus.substack.com/feed" | python3 -c "
          import sys, json
          from xml.etree import ElementTree as ET
          data = sys.stdin.read()
          root = ET.fromstring(data)
          ns = {'content': 'http://purl.org/rss/1.0/modules/content/'}
          items = root.findall('.//item')
          posts = []
          for item in items:
              t = item.find('title')
              l = item.find('link')
              d = item.find('pubDate')
              desc = item.find('description')
              body = item.find('content:encoded', ns)
              title = t.text if t is not None else ''
              if title.startswith('[COPY]'):
                  continue
              posts.append({
                  'title': title,
                  'link': l.text.strip() if l is not None else '',
                  'pubDate': d.text if d is not None else '',
                  'description': desc.text if desc is not None else '',
                  'content': body.text if body is not None else ''
              })
          print(json.dumps({'items': posts}, ensure_ascii=False, indent=2))
          " > posts.json

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add posts.json
          git diff --staged --quiet || git commit -m "chore: update posts.json"
          git push
