<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Cammisa Buerhaus</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .newsletter-section {
            margin-bottom: 40px;
        }
        .newsletter-section h2 {
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #666666;
        }
        .substack-signup {
            margin-bottom: 50px;
        }
        .subscribe-form {
            display: flex;
            gap: 0;
            max-width: 420px;
        }
        .subscribe-form input[type="email"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cccccc;
            border-right: none;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            background: white;
            color: #333;
        }
        .subscribe-form input[type="email"]:focus {
            border-color: #999;
        }
        .subscribe-form button {
            padding: 10px 20px;
            background: #ff1493;
            color: white;
            border: none;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .subscribe-form button:hover {
            background: #cc0077;
        }
        .paid-subscribe-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #999999;
            text-decoration: none;
        }
        .paid-subscribe-link:hover {
            color: #ff1493;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .post-list li {
            border-bottom: 1px solid #f0f0f0;
        }
        .post-list li:last-child {
            border-bottom: none;
        }
        .post-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 14px 0;
            cursor: pointer;
            gap: 12px;
        }
        .post-header:hover .post-title {
            color: #ff1493;
        }
        .post-title {
            color: #666666;
            font-size: 1rem;
            flex: 1;
            transition: color 0.15s;
        }
        .post-meta {
            font-size: 0.8rem;
            color: #cccccc;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .post-toggle {
            font-size: 0.75rem;
            color: #cccccc;
            flex-shrink: 0;
            transition: transform 0.2s;
            user-select: none;
        }
        .post-toggle.open {
            transform: rotate(90deg);
        }
        .post-body {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        .post-body[style*="none"] {
            overflow: visible;
        }
        .post-body-inner {
            padding-bottom: 20px;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.7;
        }
        .post-body-inner img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 12px 0;
        }
        .post-body-inner h2, .post-body-inner h3 {
            font-size: 1rem;
            margin: 16px 0 6px;
            color: #444;
        }
        .post-body-inner p {
            margin: 0 0 10px;
        }
        .post-body-inner a {
            color: #ff1493;
        }
        .post-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            margin: 16px 0;
        }
        .post-gallery img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            cursor: zoom-in;
        }
        .gallery-caption {
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 4px;
            grid-column: 1 / -1;
        }
        .image-lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 9999;
            cursor: zoom-out;
        }
        .image-lightbox.open {
            display: flex;
        }
        .image-lightbox img {
            max-width: 95vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }
        .image-lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: rgba(0, 0, 0, 0.35);
            color: #fff;
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            padding: 10px 12px;
        }
        .image-lightbox-prev {
            left: 12px;
        }
        .image-lightbox-next {
            right: 12px;
        }
        .image-lightbox-nav:disabled {
            opacity: 0.25;
            cursor: default;
        }
        .image-lightbox-close {
            position: absolute;
            top: 14px;
            right: 16px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 1.8rem;
            line-height: 1;
            cursor: pointer;
            padding: 4px 8px;
        }
        .post-substack-link {
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
        }
        .post-substack-link a {
            color: #999 !important;
            font-size: 0.85rem;
        }
        .post-substack-link a:hover {
            color: #ff1493 !important;
        }
        .loading {
            color: #cccccc;
            font-size: 0.9rem;
            padding: 14px 0;
        }
        .error-msg {
            color: #cccccc;
            font-size: 0.9rem;
            padding: 14px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="name">CAMMISA BUERHAUS</div>
            <div class="location">b. New Kingston, NY, USA</div>
            <div class="location">Working in Berlin, DE and NYC, USA</div>
            <div class="email">c.buerhaus@gmail.com</div>
        </div>

        <div class="organization-toggle">
            <a href="/" class="toggle-button">CV by Category</a>
            <a href="/?view=year" class="toggle-button">CV by Year</a>
            <a href="/newsletter.html" class="toggle-button active">Blog</a>
        </div>

        <div class="newsletter-section substack-signup">
            <h2>Subscribe</h2>
            <form class="subscribe-form" onsubmit="handleSubscribe(event)">
                <input type="email" name="email" placeholder="your@email.com" required autocomplete="email" />
                <button type="submit">Subscribe (free)</button>
            </form>
            <a href="https://cammisabuerhaus.substack.com/subscribe" target="_blank" rel="noopener noreferrer" class="paid-subscribe-link">Subscribe and support with a monthly pledge &rarr;</a>
        </div>

        <div class="newsletter-section">
            <h2>Posts</h2>
            <ul class="post-list" id="post-list">
                <li class="loading">Loading posts&hellip;</li>
            </ul>
        </div>
    </div>

    <script>
        function handleSubscribe(event) {
            event.preventDefault();
            var email = event.target.querySelector('input[type="email"]').value;
            var w = 500, h = 600;
            var left = (screen.width / 2) - (w / 2);
            var top = (screen.height / 2) - (h / 2);
            window.open(
                'https://cammisabuerhaus.substack.com/subscribe?email=' + encodeURIComponent(email),
                'substack_subscribe',
                'width=' + w + ',height=' + h + ',top=' + top + ',left=' + left + ',resizable=yes,scrollbars=yes'
            );
        }

        function togglePost(header) {
            var body = header.nextElementSibling;
            var toggle = header.querySelector('.post-toggle');
            var isOpen = body.style.maxHeight && body.style.maxHeight !== '0px';
            if (isOpen) {
                body.style.maxHeight = '0px';
                toggle.classList.remove('open');
                header.setAttribute('aria-expanded', 'false');
            } else {
                body.style.maxHeight = 'none';
                toggle.classList.add('open');
                header.setAttribute('aria-expanded', 'true');
            }
        }

        function ensureLightbox() {
            var existing = document.getElementById('image-lightbox');
            if (existing) return existing;
            var lightbox = document.createElement('div');
            lightbox.id = 'image-lightbox';
            lightbox.className = 'image-lightbox';
            lightbox.innerHTML = ''
                + '<button class="image-lightbox-close" aria-label="Close image">&times;</button>'
                + '<button class="image-lightbox-nav image-lightbox-prev" aria-label="Previous image">&#10094;</button>'
                + '<img alt="Expanded gallery image">'
                + '<button class="image-lightbox-nav image-lightbox-next" aria-label="Next image">&#10095;</button>';
            document.body.appendChild(lightbox);
            return lightbox;
        }

        var lightboxState = {
            images: [],
            index: 0
        };

        function updateLightboxImage() {
            var lightbox = ensureLightbox();
            var img = lightbox.querySelector('img');
            var prev = lightbox.querySelector('.image-lightbox-prev');
            var next = lightbox.querySelector('.image-lightbox-next');
            img.src = lightboxState.images[lightboxState.index] || '';
            var hasMultiple = lightboxState.images.length > 1;
            prev.disabled = !hasMultiple;
            next.disabled = !hasMultiple;
        }

        function openLightbox(images, startIndex) {
            var lightbox = ensureLightbox();
            lightboxState.images = images && images.length ? images : [];
            lightboxState.index = typeof startIndex === 'number' ? startIndex : 0;
            updateLightboxImage();
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function moveLightbox(step) {
            if (!lightboxState.images.length) return;
            lightboxState.index = (lightboxState.index + step + lightboxState.images.length) % lightboxState.images.length;
            updateLightboxImage();
        }

        function closeLightbox() {
            var lightbox = document.getElementById('image-lightbox');
            if (!lightbox) return;
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
            lightboxState.images = [];
            lightboxState.index = 0;
        }

        document.addEventListener('click', function (event) {
            var target = event.target;

            if (target.matches('.post-body-inner img')) {
                var scope = target.closest('.post-gallery') || target.closest('.post-body-inner');
                var images = scope ? Array.from(scope.querySelectorAll('img')) : [target];
                var sources = images.map(function (img) { return img.src; });
                var idx = images.indexOf(target);
                openLightbox(sources, idx);
                return;
            }

            if (target.classList.contains('image-lightbox-prev')) {
                event.stopPropagation();
                moveLightbox(-1);
                return;
            }

            if (target.classList.contains('image-lightbox-next')) {
                event.stopPropagation();
                moveLightbox(1);
                return;
            }

            if (target.id === 'image-lightbox' || target.classList.contains('image-lightbox-close')) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', function (event) {
            var lightbox = document.getElementById('image-lightbox');
            var isOpen = lightbox && lightbox.classList.contains('open');
            if (!isOpen) return;
            if (event.key === 'Escape') {
                closeLightbox();
            } else if (event.key === 'ArrowLeft') {
                moveLightbox(-1);
            } else if (event.key === 'ArrowRight') {
                moveLightbox(1);
            }
        });
    </script>

    <script>
        (function () {
            fetch('/posts.json')
                .then(function (res) {
                    if (!res.ok) throw new Error('Failed to load posts.json');
                    return res.json();
                })
                .then(function (data) {
                    var list = document.getElementById('post-list');
                    if (!data.items || data.items.length === 0) {
                        list.innerHTML = '<li class="error-msg">No posts yet. <a href="https://cammisabuerhaus.substack.com" target="_blank" rel="noopener noreferrer">Visit Substack directly</a>.</li>';
                        return;
                    }
                    list.innerHTML = data.items.map(function (item, i) {
                        var date = item.pubDate ? new Date(item.pubDate) : null;
                        var dateStr = date && !isNaN(date)
                            ? date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
                            : '';
                        var bodyHtml = item.content || '';
                        return '<li>'
                            + '<div class="post-header" onclick="togglePost(this)" aria-expanded="false">'
                            + '<span class="post-title">' + item.title + '</span>'
                            + (dateStr ? '<span class="post-meta">' + dateStr + '</span>' : '')
                            + '<span class="post-toggle">&#9658;</span>'
                            + '</div>'
                            + '<div class="post-body">'
                            + '<div class="post-body-inner">' + bodyHtml
                            + (item.link ? '<p class="post-substack-link"><a href="' + item.link + '" target="_blank" rel="noopener noreferrer">Read on Substack &rarr;</a></p>' : '')
                            + '</div>'
                            + '</div>'
                            + '</li>';
                    }).join('');

                    // Render image galleries from Substack's data-attrs JSON
                    document.querySelectorAll('.image-gallery-embed').forEach(function (el) {
                        try {
                            var attrs = JSON.parse(el.getAttribute('data-attrs'));
                            var images = attrs && attrs.gallery && attrs.gallery.images;
                            var caption = attrs && attrs.gallery && attrs.gallery.caption;
                            if (!images || !images.length) return;
                            var html = '<div class="post-gallery">';
                            images.forEach(function (img) {
                                var src = 'https://substackcdn.com/image/fetch/w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/' + encodeURIComponent(img.src);
                                html += '<img src="' + src + '" loading="lazy" alt="">';
                            });
                            if (caption) html += '<p class="gallery-caption">' + caption + '</p>';
                            html += '</div>';
                            el.outerHTML = html;
                        } catch (e) {}
                    });
                })
                .catch(function () {
                    var list = document.getElementById('post-list');
                    list.innerHTML = '<li class="error-msg">Could not load posts. <a href="https://cammisabuerhaus.substack.com" target="_blank" rel="noopener noreferrer">Visit Substack directly</a>.</li>';
                });
        })();
    </script>
</body>
</html>
