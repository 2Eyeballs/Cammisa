---
layout: default
---

<article class="post">
    <header>
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">
            <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
            {% if page.categories %}
                <span class="post-category">{{ page.categories | join: ', ' }}</span>
            {% endif %}
        </p>
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>
